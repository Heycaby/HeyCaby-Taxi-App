name: heycaby_driver
description: HeyCaby Driver app
version: 1.0.0+25

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: '>=3.19.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  flutter_riverpod: ^2.5.0
  supabase_flutter: ^2.5.0
  dio: ^5.4.0
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.2.0
  geolocator: ^11.0.0
  connectivity_plus: ^6.0.5
  permission_handler: ^11.3.0
  go_router: ^13.2.0
  google_fonts: ^6.2.1
  intl: any
  
  # Maps
  mapbox_maps_flutter: 2.19.1
  
  # Audio
  audioplayers: ^6.0.0
  
  # SVG
  flutter_svg: ^2.0.9
  
  # Design doc packages
  flutter_animate: ^4.5.0
  fl_chart: ^0.68.0
  cached_network_image: ^3.3.1
  flutter_cache_manager: ^3.3.1
  easy_refresh: ^3.4.0
  image_picker: ^1.0.7
  url_launcher: ^6.2.0
  share_plus: ^7.2.2
  pdf: ^3.11.1
  path_provider: ^2.1.5
  record: ^6.2.0
  webview_flutter: ^4.7.0
  in_app_purchase: ^3.2.0

  heycaby_api:
    path: ../../packages/heycaby_api
  heycaby_models:
    path: ../../packages/heycaby_models
  heycaby_ui:
    path: ../../packages/heycaby_ui
  heycaby_map:
    path: ../../packages/heycaby_map
  heycaby_utils:
    path: ../../packages/heycaby_utils
  lucide_flutter: ^0.575.0
  firebase_core: ^3.8.0
  firebase_messaging: ^15.1.5
  just_audio: ^0.10.5
  local_auth: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/branding/
    - assets/images/
    - assets/icons/
    - assets/illustrations/
    - assets/lottie/
    - assets/patterns/
    - assets/backgrounds/
    - assets/sounds/driver/
    - assets/sounds/shared/
    - assets/audio/
